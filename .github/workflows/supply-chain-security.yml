name: Supply Chain Security

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  slsa-verifier:
    name: SLSA Verifier
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify SLSA provenance
        uses: slsa-framework/slsa-verifier/actions/verify@v2
        with:
          provenance_path: ''
          source_repository: ${{ github.repository }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-dependencies-licenses: 'MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC'

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        uses: npm/npmaudit-action@v1
        with:
          audit_level: high
        continue-on-error: true

  security-scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: scorecard

  provenance:
    name: Generate SLSA Provenance
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Generate provenance
        uses: slsa-framework/slsa-github-generator-dockerful/attest-builder@v1
        with:
          builder-image: '${{ needs.build.outputs.image }}'
          tag: '${{ needs.build.outputs.tag }}'
          sbom-file: 'sbom.spdx'
          predicate-type: 'https://slsa.dev/provenance/v1'
          predicate-output: 'provenance.json'

  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.metadata.outputs.image }}
      tag: ${{ steps.metadata.outputs.tag }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata
        id: metadata
        run: |
          echo "image=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  sigstore-sign:
    name: Sigstore Sign
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sign with Sigstore
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.2'

      - name: Sign container image
        run: |
          cosign sign --yes \
            --fulcio-url https://fulcio.sigstore.dev \
            --rekor-url https://rekor.sigstore.dev \
            ${{ needs.build.outputs.image }}@${{ needs.build.outputs.tag }}
        env:
          COSIGN_EXPERIMENTAL: '1'

  third-party-scanning:
    name: Third-Party Component Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Check for vulnerabilities with npm
        run: npm audit --audit-level=high

      - name: Generate SBOM
        uses: CycloneDX/gh-node-module-gen@v1
        with:
          output: sbom.xml

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.xml
